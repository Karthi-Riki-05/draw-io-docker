version: '3.5'
services:
  drawio:
    image: kart008/drawio-custom:v1.0.0
    container_name: drawio
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      # Custom settings from previous override
      - DRAWIO_BASE_URL=http://localhost:8080
      - DRAWIO_CSP_HEADER=
      - DRAWIO_VIEWER_URL=
      - DRAWIO_SELF_CONTAINED=1

      # Default certificate generation settings
      - PUBLIC_DNS=localhost
      - ORGANISATION_UNIT=unit
      - ORGANISATION=org
      - CITY=city
      - STATE=state
      - COUNTRY_CODE=country
    volumes:
      - ./drawio-src/src/main/webapp:/usr/local/tomcat/webapps/draw
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080 || exit 1" ]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 10s

  ai-proxy:
    image: kart008/drawio-custom-ai-proxy:v1.0.0
    container_name: drawio-ai-proxy
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3001
